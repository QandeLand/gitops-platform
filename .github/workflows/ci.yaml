name: CI — Build and deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/qandeland/gitops-platform/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Generate image tag
        id: tag
        run: echo "value=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/backend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE }}:latest

      - name: Update image tag in Helm values
        run: |
          sed -i "s/tag:.*/tag: \"${{ steps.tag.outputs.value }}\"/" helm/backend/values.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add helm/backend/values.yaml
          git commit -m "ci: update backend image to ${{ steps.tag.outputs.value }}"
          git push

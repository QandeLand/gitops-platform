apiVersion: networking.k8s.io/v1
kind: ingress
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-backend
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web

spec:
  rules:
  name: backed-dev-backend
  port: 5000